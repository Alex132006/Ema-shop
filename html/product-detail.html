    <!-- Header -->
    <div class="container-categorie">
        <h2><i class="fas fa-shop"></i> EMA-Shop</h2>
        <div class="container-cate" title="Pannier">
            <a href="connect.html"><i class="fa-solid fa-history"></i></a>
            <a href="Pannier.html"><i class="fa-solid fa-shopping-cart"></i></a>
        </div>
    </div>

    <!-- Product Detail Section -->
    <section class="product-detail">
        <div class="product-container">
            <div class="product-image">
                <img src="../img/Screenshot from 2025-12-18 02-11-57.png" alt="Produit" id="product-image">
            </div>
            <div class="product-info">
                <h1 id="product-name">Habit Complet</h1>
                <div class="price-section">
                    <p class="current-price"><i class="fa-solid fa-wallet"></i> <span id="current-price">300.cfa</span>
                    </p>
                    <p class="old-price" id="old-price">2000.cfa</p>
                </div>
                <p class="shop-name"><i class="fa-solid fa-certificate"></i> <span id="shop-name">Ema's Shop</span></p>
                <div class="rating">
                    <p><i class="fa-solid fa-star"></i> <span id="rating">4.5</span></p>
                    <p class="reviews">(<span id="reviews">734</span> notes)</p>
                </div>
                <div class="description">
                    <h3>Description</h3>
                    <p id="product-description">Cet habit complet est parfait pour toutes occasions. Confortable,
                        élégant et de qualité supérieure. Disponible en différentes tailles.</p>
                </div>
                <div class="actions">
                    <button class="add-to-cart"><i class="fa-solid fa-cart-plus"></i> Ajouter au panier</button>
                    <button class="buy-now">Acheter maintenant</button>
                </div>
                <a href="Ema-shop.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retour à la
                    boutique</a>
            </div>
        </div>
    </section>
